<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Juan Angeles Sarabia</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body>

  <!-- NAV -->
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="container">

    <section class="card contact-page">
      <h1>Contact Me</h1>

      <p>If you’d like to collaborate or have any questions, feel free to reach out.</p>

      

      <p>Location: California, USA</p>

      <!-- FORM -->
      <form id="contact-form" action="https://formsubmit.co/4c612a142877b3c8ca3b862c889344c1" method="POST">

        <!-- Optional settings -->
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="New Portfolio Message!">

        <div class="form-row">
          <input 
            type="text" 
            name="name" 
            placeholder="Full Name" 
            required
          >

          <input 
            type="email" 
            name="email" 
            placeholder="Email Address" 
            required
          >
        </div>

        <textarea 
          name="message" 
          placeholder="Your Message" 
          rows="6" 
          required
        ></textarea>

        <button type="submit" class="btn">Send Message</button>

        <input type="hidden" name="_next" value="http://127.0.0.1:5500/thankyou.html">
      </form>

    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <div class="socials">
      <a href="https://github.com/banderilla98" target="_blank"><img src="images/github.svg" alt="GitHub"></a>
      <a href="https://www.linkedin.com/in/juan-angeles-sarabia/" target="_blank"><img src="images/linkedin.svg" alt="LinkedIn"></a>
      <a href="https://www.instagram.com/bandersnath/" target="_blank"><img src="images/instagram.svg" alt="Instagram"></a>
      <a href="https://facebook.com/yourname"><img src="images/facebook.svg" alt="Facebook"></a>
      <a href="https://indeed.com/profile/yourname"><img src="images/indeed.svg" alt="Indeed"></a>
    </div>
    <p>&copy; <span id="year"></span> Juan Angeles Sarabia. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>

  <div id="popup" class="popup">
  <div class="popup-box">

    <!-- ICON -->
    <div id="popup-icon" class="popup-icon"></div>

    <!-- MESSAGE -->
    <p id="popup-message">Message sent successfully!</p>

  </div>
</div>

<script>
  const form = document.getElementById("contact-form");
  const popup = document.getElementById("popup");
  const message = document.getElementById("popup-message");
  const icon = document.getElementById("popup-icon");
  const button = form.querySelector("button");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const formData = new FormData(form);

    // LOADING STATE
    button.disabled = true;
    button.innerHTML = "Sending... ⏳";

    try {
      const response = await fetch("https://formsubmit.co/ajax/4c612a142877b3c8ca3b862c889344c1", {
        method: "POST",
        body: formData,
        // IMPORTANT: Do NOT set Content-Type when using FormData
      });

      const data = await response.json();

      if (data.success) {
        showPopup("Message sent successfully!", "success");
        form.reset();
      } else {
        showPopup("Something went wrong. Try again.", "error");
      }
    } catch (error) {
      console.error(error);
      showPopup("Something went wrong. Try again.", "error");
    }

    // RESET BUTTON
    button.disabled = false;
    button.innerHTML = "Send Message";
  });

  function showPopup(text, type) {
    message.textContent = text;

    if (type === "success") {
      icon.innerHTML = "✔";
      icon.className = "popup-icon success";
    } else {
      icon.innerHTML = "✖";
      icon.className = "popup-icon error";
    }

    popup.classList.add("show");

    setTimeout(() => {
      popup.classList.remove("show");
    }, 3000);
  }
</script>
</body>
</html>
